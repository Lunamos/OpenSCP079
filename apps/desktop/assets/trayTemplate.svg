<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="262 290 500 520">
  <!-- macOS menu-bar template icon: the SAME moth as assets/icon.svg, drawn as
       a solid monochrome silhouette with no background. Rendered to
       trayTemplate.png / trayTemplate@2x.png; the `Template` suffix makes macOS
       treat it as a template image and auto-invert it (white on a dark menu
       bar, dark on a light one). Geometry is copied verbatim from icon.svg's
       `halfmoth3`; the eyespot rings are dropped so it stays a clean solid at
       18px. KEEP IN SYNC with icon.svg if the moth ever changes. -->
  <defs>
    <g id="halfmoth-tray">
      <!-- antenna -->
      <path d="M 506 402 C 490 360 470 328 442 308 C 470 318 496 352 510 394 Z"/>
      <!-- forewing -->
      <path d="M 507 436 C 460 408 380 360 318 342 C 290 334 276 344 280 366
               C 288 412 330 472 394 508 C 442 535 486 542 504 532 Z"/>
      <!-- hindwing + luna tail -->
      <path d="M 503 542 C 455 538 400 556 386 596 C 372 634 392 666 424 672
               C 420 716 426 756 444 788 C 450 798 462 796 464 784
               C 470 730 476 670 486 626 C 492 596 500 560 503 548 Z"/>
    </g>
  </defs>

  <g fill="#000000" transform="rotate(-8 512 530)">
    <use href="#halfmoth-tray"/>
    <use href="#halfmoth-tray" transform="matrix(-1,0,0,1,1024,0)"/>
    <!-- body: head + tapered abdomen -->
    <path d="M 512 404 C 530 404 538 426 537 458 C 536 510 526 562 512 588
             C 498 562 488 510 487 458 C 486 426 494 404 512 404 Z"/>
    <circle cx="512" cy="404" r="19"/>
  </g>
</svg>
